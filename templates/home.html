<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Crop Recommendation</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
	<style>
		:root {
			--brand-green: #198754;
			--brand-green-dark: #146c43;
		}

		body {
			min-height: 100vh;
			background:
				linear-gradient(rgba(7, 35, 20, 0.72), rgba(7, 35, 20, 0.72)),
				url('https://images.unsplash.com/photo-1464226184884-fa280b87c399?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat fixed;
			font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
		}

		.main-card {
			border: none;
			border-radius: 1rem;
			overflow: hidden;
			backdrop-filter: blur(4px);
			animation: fadeInUp 0.5s ease;
		}

		.card-header {
			background: linear-gradient(135deg, var(--brand-green), var(--brand-green-dark)) !important;
		}

		.form-control {
			border-radius: 0.65rem;
			transition: all 0.2s ease;
		}

		.form-control:focus {
			border-color: var(--brand-green);
			box-shadow: 0 0 0 0.2rem rgba(25, 135, 84, 0.2);
			transform: translateY(-1px);
		}

		.btn-success {
			border-radius: 0.75rem;
			transition: transform 0.2s ease, box-shadow 0.2s ease;
		}

		.btn-success:hover {
			transform: translateY(-2px);
			box-shadow: 0 10px 20px rgba(25, 135, 84, 0.25);
		}

		.result-box {
			border-radius: 0.8rem;
			border: 1px solid rgba(13, 110, 253, 0.2);
		}

		.social-links a {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			width: 40px;
			height: 40px;
			border-radius: 50%;
			text-decoration: none;
			margin: 0 6px;
			color: #fff;
			background: linear-gradient(135deg, var(--brand-green), var(--brand-green-dark));
			box-shadow: 0 6px 14px rgba(20, 108, 67, 0.25);
			position: relative;
			z-index: 2;
			transition: all 0.2s ease;
		}

		.social-links svg {
			width: 20px;
			height: 20px;
			fill: currentColor;
		}

		.social-links a:hover {
			transform: translateY(-2px) scale(1.04);
			background: linear-gradient(135deg, #20a15f, #146c43);
			box-shadow: 0 10px 18px rgba(20, 108, 67, 0.35);
		}

		@keyframes fadeInUp {
			from {
				opacity: 0;
				transform: translateY(10px);
			}
			to {
				opacity: 1;
				transform: translateY(0);
			}
		}

		@media (max-width: 576px) {
			.container {
				padding-top: 1.25rem !important;
				padding-bottom: 1.25rem !important;
			}

			.card-body {
				padding: 1rem;
			}

			.card-header h2 {
				font-size: 1.35rem;
			}

			.btn-lg {
				font-size: 1rem;
				padding: 0.65rem 1rem;
			}
		}
	</style>
</head>

<body>
	<div class="container py-5">
		<div class="row justify-content-center">
			<div class="col-lg-8">
				<div class="card shadow-lg main-card">
					<div class="card-header bg-success text-white text-center">
						<h2 class="mb-0">Crop Recommendation</h2>
					</div>
					<div class="card-body">
						<form action="{{ url_for('predict') }}" method="POST" class="row g-3">
							<div class="col-md-4">
								<label class="form-label">Nitrogen (N)</label>
								<input type="number" step="0.1" min="0" name="N" class="form-control" required>
							</div>
							<div class="col-md-4">
								<label class="form-label">Phosphorus (P)</label>
								<input type="number" step="0.1" min="0" name="P" class="form-control" required>
							</div>
							<div class="col-md-4">
								<label class="form-label">Potassium (K)</label>
								<input type="number" step="0.1" min="0" name="K" class="form-control" required>
							</div>

							<div class="col-md-4">
								<label class="form-label">Temperature (°C)</label>
								<input type="number" step="0.1" name="temperature" class="form-control" required>
							</div>
							<div class="col-md-4">
								<label class="form-label">Humidity (%)</label>
								<input type="number" step="0.1" min="0" max="100" name="humidity" class="form-control" required>
							</div>
							<div class="col-md-4">
								<label class="form-label">pH</label>
								<input type="number" step="0.01" min="0" max="14" name="ph" class="form-control" required>
							</div>

							<div class="col-12">
								<label class="form-label">Rainfall (mm)</label>
								<input type="number" step="0.1" min="0" name="rainfall" class="form-control" required>
							</div>

							<div class="col-12 d-grid mt-2">
								<button type="submit" class="btn btn-success btn-lg">Predict Crop</button>
							</div>
						</form>

						{% if results %}
						<div class="alert alert-info mt-4 text-center result-box" role="alert">
							<h4 class="mb-0">Recommended Crop: <strong>{{ results }}</strong></h4>
						</div>
						{% endif %}

						<div class="d-flex flex-column align-items-center mt-4">
							<p class="text-muted mb-2">Connect with us</p>
							<div class="social-links">
								<a href="https://www.instagram.com/lucifer_ysh/" target="_blank" aria-label="Instagram">
									<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
										<path d="M7.75 2h8.5A5.75 5.75 0 0 1 22 7.75v8.5A5.75 5.75 0 0 1 16.25 22h-8.5A5.75 5.75 0 0 1 2 16.25v-8.5A5.75 5.75 0 0 1 7.75 2Zm0 1.8A3.95 3.95 0 0 0 3.8 7.75v8.5a3.95 3.95 0 0 0 3.95 3.95h8.5a3.95 3.95 0 0 0 3.95-3.95v-8.5a3.95 3.95 0 0 0-3.95-3.95h-8.5Zm8.95 1.35a1.15 1.15 0 1 1 0 2.3 1.15 1.15 0 0 1 0-2.3ZM12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10Zm0 1.8a3.2 3.2 0 1 0 0 6.4 3.2 3.2 0 0 0 0-6.4Z"/>
									</svg>
								</a>
								<a href="https://github.com/yashjain15357" target="_blank" aria-label="GitHub">
									<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
										<path d="M12 2C6.48 2 2 6.59 2 12.25c0 4.53 2.87 8.37 6.84 9.73.5.1.68-.22.68-.49 0-.24-.01-1.04-.01-1.89-2.78.61-3.37-1.22-3.37-1.22-.45-1.18-1.11-1.49-1.11-1.49-.9-.64.07-.63.07-.63 1 .07 1.53 1.05 1.53 1.05.88 1.56 2.3 1.11 2.86.85.09-.66.35-1.11.63-1.37-2.22-.26-4.56-1.15-4.56-5.12 0-1.13.39-2.05 1.03-2.77-.1-.26-.45-1.31.1-2.73 0 0 .84-.28 2.75 1.06A9.3 9.3 0 0 1 12 6.85c.85 0 1.71.12 2.51.36 1.91-1.34 2.75-1.06 2.75-1.06.55 1.42.2 2.47.1 2.73.64.72 1.03 1.64 1.03 2.77 0 3.98-2.34 4.85-4.57 5.11.36.32.68.94.68 1.9 0 1.37-.01 2.47-.01 2.81 0 .27.18.59.69.49A10.27 10.27 0 0 0 22 12.25C22 6.59 17.52 2 12 2Z"/>
									</svg>
								</a>
								<a href="https://www.linkedin.com/in/yash-jain-baa784308/?skipRedirect=true" target="_blank" aria-label="LinkedIn">
									<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
										<path d="M6.94 8.5A1.56 1.56 0 1 0 6.94 5.38a1.56 1.56 0 0 0 0 3.12ZM5.7 9.7h2.5V18H5.7V9.7Zm4.05 0h2.4v1.13h.03c.33-.63 1.15-1.3 2.37-1.3 2.53 0 3 1.67 3 3.84V18h-2.5v-4.09c0-.98-.02-2.23-1.36-2.23-1.36 0-1.57 1.06-1.57 2.16V18h-2.5V9.7Z"/>
									</svg>
								</a>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>
</body>
</html>
